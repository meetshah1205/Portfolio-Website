<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />


  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Meet Shah</title>

  <style>
    body {
      background-color: #1c1e21;
      font-family: "Poppins", sans-serif;
      color: #fff;
      margin: 0;
      transition: opacity 0.6s ease-in-out;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
    }

    .navbar-brand .meet,
    .navbar-brand .shah {
      transition: all ease-in 1s;
    }

    .navbar-brand:hover .meet {
      color: #ff6f61;
    }

    .navbar-brand:hover .shah {
      color: #d0736b;
    }

    .nav-link {
      font-weight: 500;
      transition: color 0.3s ease-in-out;
      margin: 0 1rem;
      padding: 0.5rem 1rem;
    }

    .nav-link:hover {
      color: #ff6f61 !important;
    }

    .navbar {
      background-color: #1c1e21;
    }

    .navbar-nav {
      margin: 0 auto;
    }

    .greet {
      font-size: 3rem;
      font-weight: 700;
      background-image: linear-gradient(to right,
          blue,
          purple,
          magenta,
          cyan,
          yellow,
          orange,
          red);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: "Poppins", sans-serif;
      font-weight: 500;
      text-align: center;
      animation: fadeIn 2s ease-in-out, slideIn 2s ease-in-out;
      cursor: default;
    }

    h3 {
      font-size: 1.5rem;
      font-weight: 500;
      margin-top: 1rem;
    }

    #about,
    #projects,
    #contact,
    #software {
      opacity: 50%;
    }

    #about:hover,
    #projects:hover,
    #contact:hover,
    #software:hover {
      opacity: 100%;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes slideIn {
      0% {
        transform: translateY(-10%);
      }

      100% {
        transform: translateY(0);
      }
    }

    @keyframes zoomIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .zoom-in {
      animation: zoomIn 0.6s ease-in-out;
    }
  </style>
</head>

<body>
  <nav class="bg-gray-800 p-4 fixed w-full z-10 top-0">
    <div class="container mx-auto flex justify-between items-center">
      <a class="text-2xl font-bold" href="./index.html">Meet Shah</a>
      <div class="hidden md:flex space-x-6">
        <a id="about" class="hover:text-gray-400" href="./about.html">About Me</a>
        <a id="projects" class="hover:text-gray-400" href="./projects.html">Projects</a>
        <a id="contact" class="hover:text-gray-400" href="./contact.html">Contact</a>
        <a id="software" class="hover:text-gray-400" href="./software.html">Software I Use</a>
      </div>
      <button class="md:hidden text-2xl focus:outline-none">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>


  </div>

  <!-- Bootstrap JS dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-LtrjvnR4/Jqs8+9z9vB1sI0e/ZxAVFTcEpcA8+W+f/qmfDEJ+zRf5iWpGYNFJkCs"
    crossorigin="anonymous"></script>
  <!-- Local JS -->
  <script src="../JS/index.js"></script>
  <script src="../JS/removeContextMenu.js"></script>
</body>

</html>
